version: 2
project_name: vapi-pp-cli
changelog:
  disable: true
builds:
  - id: vapi-pp-cli
    main: ./cmd/vapi-pp-cli
    binary: vapi-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/vapi/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: vapi-pp-mcp
    main: ./cmd/vapi-pp-mcp
    binary: vapi-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: vapi-pp-cli
    repository:
      owner: zakdjila
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Vapi feature, plus a local SQLite store that makes cost analytics, transcript search, and orphan cleanup..."
    install: |
      bin.install "vapi-pp-cli"
      bin.install "vapi-pp-mcp"
